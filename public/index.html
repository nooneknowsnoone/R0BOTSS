<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Bot Controller</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2.5em;
        }

        .status-card {
            background: #f0f0f0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            border-left: 4px solid #ff4444;
        }

        .status-card h3 {
            color: #333;
        }

        #bot-status {
            color: #ff4444;
            font-weight: bold;
        }

        #bot-status.running {
            color: #00C851;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            font-family: monospace;
        }

        select[multiple] {
            height: 150px;
        }

        small {
            display: block;
            color: #666;
            margin-top: 5px;
            font-size: 12px;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-success {
            background: #00C851;
        }

        .btn-danger {
            background: #ff4444;
        }

        .output {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 6px;
            padding: 15px;
            min-height: 100px;
            font-family: monospace;
            white-space: pre-wrap;
            color: #333;
        }

        .success-message {
            color: #00C851;
            font-weight: bold;
        }

        .error-message {
            color: #ff4444;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Facebook Bot Controller</h1>
        
        <div class="status-card">
            <h3>Bot Status: <span id="bot-status">Not Running</span></h3>
        </div>

        <div class="form-group">
            <label for="appstate">Appstate (JSON):</label>
            <textarea id="appstate" rows="5" placeholder='Paste your Facebook appstate JSON here...'></textarea>
        </div>

        <div class="form-group">
            <label for="adminUID">Admin Facebook UID:</label>
            <input type="text" id="adminUID" placeholder="Your Facebook UID">
        </div>

        <div class="form-group">
            <label for="prefix">Command Prefix:</label>
            <input type="text" id="prefix" value="/" placeholder="/">
        </div>

        <div class="form-group">
            <label for="commands">Select Commands:</label>
            <select id="commands" multiple>
                <!-- Will be populated by JavaScript -->
            </select>
            <small>Hold Ctrl/Cmd to select multiple, or leave empty for all</small>
        </div>

        <div class="button-group">
            <button id="startBot" class="btn btn-success">▶️ Start Bot</button>
            <button id="stopBot" class="btn btn-danger" disabled>⏹️ Stop Bot</button>
        </div>

        <div id="output" class="output"></div>
    </div>

    <script>
        let currentAdminUID = '';

        // Load available commands on page load
        async function loadCommands() {
            try {
                const response = await fetch('/api/commands');
                const data = await response.json();
                
                if (data.success) {
                    const select = document.getElementById('commands');
                    select.innerHTML = '';
                    data.commands.forEach(cmd => {
                        const option = document.createElement('option');
                        option.value = cmd;
                        option.textContent = cmd;
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('Failed to load commands:', error);
            }
        }

        // Check bot status periodically
        async function checkStatus(adminUID) {
            if (!adminUID) return;
            
            try {
                const response = await fetch(\`/api/status/\${adminUID}\`);
                const data = await response.json();
                
                const statusSpan = document.getElementById('bot-status');
                const startBtn = document.getElementById('startBot');
                const stopBtn = document.getElementById('stopBot');
                
                if (data.success && data.running) {
                    statusSpan.textContent = \`Running (Prefix: \${data.prefix})\`;
                    statusSpan.className = 'running';
                    startBtn.disabled = true;
                    stopBtn.disabled = false;
                } else {
                    statusSpan.textContent = 'Not Running';
                    statusSpan.className = '';
                    startBtn.disabled = false;
                    stopBtn.disabled = true;
                }
            } catch (error) {
                console.error('Status check failed:', error);
            }
        }

        // Start bot
        document.getElementById('startBot').addEventListener('click', async () => {
            const appstate = document.getElementById('appstate').value;
            const adminUID = document.getElementById('adminUID').value;
            const prefix = document.getElementById('prefix').value || '/';
            const commandSelect = document.getElementById('commands');
            
            // Get selected commands
            const selectedCommands = Array.from(commandSelect.selectedOptions).map(opt => opt.value);
            
            if (!appstate || !adminUID) {
                showOutput('Please provide both Appstate and Admin UID', 'error');
                return;
            }
            
            try {
                // Try to parse appstate to validate JSON
                JSON.parse(appstate);
            } catch (e) {
                showOutput('Invalid JSON in Appstate field', 'error');
                return;
            }
            
            showOutput('Starting bot...', 'info');
            
            try {
                const response = await fetch('/api/start-bot', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        appstate,
                        adminUID,
                        prefix,
                        selectedCommands: selectedCommands.length ? selectedCommands : 'all'
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showOutput(data.message, 'success');
                    currentAdminUID = adminUID;
                    await checkStatus(adminUID);
                } else {
                    showOutput(\`Error: \${data.error}\`, 'error');
                }
            } catch (error) {
                showOutput(\`Failed to start bot: \${error.message}\`, 'error');
            }
        });

        // Stop bot
        document.getElementById('stopBot').addEventListener('click', async () => {
            const adminUID = document.getElementById('adminUID').value;
            
            if (!adminUID) {
                showOutput('Please provide Admin UID', 'error');
                return;
            }
            
            showOutput('Stopping bot...', 'info');
            
            try {
                const response = await fetch('/api/stop-bot', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminUID })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showOutput(data.message, 'success');
                    await checkStatus(adminUID);
                } else {
                    showOutput(\`Error: \${data.error}\`, 'error');
                }
            } catch (error) {
                showOutput(\`Failed to stop bot: \${error.message}\`, 'error');
            }
        });

        // Auto-check status when admin UID changes
        document.getElementById('adminUID').addEventListener('input', (e) => {
            const adminUID = e.target.value;
            if (adminUID) {
                checkStatus(adminUID);
            }
        });

        // Helper to show output
        function showOutput(message, type = 'info') {
            const output = document.getElementById('output');
            output.innerHTML = \`<span class="\${type}-message">\${message}</span>\`;
        }

        // Initialize on page load
        loadCommands();
        setInterval(() => {
            if (currentAdminUID) {
                checkStatus(currentAdminUID);
            }
        }, 5000); // Check every 5 seconds
    </script>
</body>
</html>

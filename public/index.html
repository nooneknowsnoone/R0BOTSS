<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Bot Control Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #1877f2;
            --secondary-color: #42b72a;
            --danger-color: #dc3545;
            --warning-color: #ffc107;
            --dark-bg: #1a1a2e;
            --darker-bg: #16213e;
            --card-bg: #1e1e2f;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --border-color: #2d2d44;
            --hover-color: #2a2a3c;
            --success-color: #28a745;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--dark-bg), var(--darker-bg));
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header Styles */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(30, 30, 47, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            border: 1px solid var(--border-color);
        }

        .header-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-content i {
            font-size: 2.5rem;
            color: var(--primary-color);
        }

        .header-content h1 {
            font-size: 1.8rem;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #b3b3b3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .bot-status {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: var(--card-bg);
            border-radius: 30px;
            border: 1px solid var(--border-color);
        }

        .bot-status i {
            font-size: 0.8rem;
            color: var(--warning-color);
        }

        .bot-status.online i {
            color: var(--success-color);
        }

        /* Main Content Layout */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        /* Card Styles */
        .card {
            background: var(--card-bg);
            border-radius: 15px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .card-header {
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-header i {
            color: var(--primary-color);
            font-size: 1.2rem;
        }

        .card-header h2 {
            font-size: 1.3rem;
            font-weight: 600;
        }

        .card-body {
            padding: 20px;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            background: var(--dark-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(24, 119, 242, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 150px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.9rem;
        }

        .hint {
            display: block;
            margin-top: 5px;
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        /* Status Badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            background: var(--dark-bg);
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .status-badge i {
            color: var(--warning-color);
        }

        .status-badge.loaded i {
            color: var(--success-color);
        }

        /* Commands Section */
        .commands-card .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn-select-all,
        .btn-deselect-all {
            padding: 8px 15px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s;
        }

        .btn-select-all {
            background: var(--success-color);
            color: white;
        }

        .btn-deselect-all {
            background: var(--danger-color);
            color: white;
        }

        .btn-select-all:hover,
        .btn-deselect-all:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .search-box {
            position: relative;
            margin-bottom: 20px;
        }

        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            background: var(--dark-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        .commands-list {
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 15px;
            padding-right: 5px;
        }

        .commands-list::-webkit-scrollbar {
            width: 8px;
        }

        .commands-list::-webkit-scrollbar-track {
            background: var(--dark-bg);
            border-radius: 10px;
        }

        .commands-list::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }

        .command-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            margin-bottom: 5px;
            background: var(--dark-bg);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .command-item:hover {
            background: var(--hover-color);
            transform: translateX(5px);
        }

        .command-item input[type="checkbox"] {
            margin-right: 15px;
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        .command-info {
            flex: 1;
        }

        .command-name {
            font-weight: 600;
            margin-bottom: 3px;
            text-transform: lowercase;
        }

        .command-desc {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .selected-count {
            text-align: right;
            color: var(--text-secondary);
            font-size: 0.9rem;
            padding-top: 10px;
            border-top: 1px solid var(--border-color);
        }

        /* Action Bar */
        .action-bar {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            padding: 20px;
            background: rgba(30, 30, 47, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            border: 1px solid var(--border-color);
        }

        .btn-save,
        .btn-restart,
        .btn-refresh {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
        }

        .btn-save {
            background: var(--primary-color);
            color: white;
        }

        .btn-restart {
            background: var(--warning-color);
            color: var(--dark-bg);
        }

        .btn-refresh {
            background: var(--card-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-save:hover,
        .btn-restart:hover,
        .btn-refresh:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--card-bg);
            border-left: 4px solid var(--success-color);
            border-radius: 10px;
            padding: 15px 25px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            transform: translateX(400px);
            transition: transform 0.3s;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast-content {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toast-content i {
            color: var(--success-color);
            font-size: 1.2rem;
        }

        /* Loading State */
        .loading-commands {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .loading-commands i {
            margin-right: 10px;
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .action-bar {
                flex-direction: column;
            }
            
            .btn-save,
            .btn-restart,
            .btn-refresh {
                width: 100%;
                justify-content: center;
            }
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }
            
            .commands-card .card-header {
                flex-direction: column;
                gap: 15px;
            }
            
            .header-actions {
                width: 100%;
            }
            
            .btn-select-all,
            .btn-deselect-all {
                flex: 1;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-content">
                <i class="fas fa-robot"></i>
                <h1>Facebook Bot Control Panel</h1>
            </div>
            <div class="bot-status" id="botStatus">
                <i class="fas fa-circle"></i>
                <span>Loading status...</span>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Left Panel - Appstate & Settings -->
            <div class="left-panel">
                <!-- Appstate Section -->
                <div class="card appstate-card">
                    <div class="card-header">
                        <i class="fas fa-key"></i>
                        <h2>Appstate Configuration</h2>
                    </div>
                    <div class="card-body">
                        <div class="form-group">
                            <label for="appstate">
                                <i class="fas fa-paste"></i>
                                Paste Appstate JSON
                            </label>
                            <textarea 
                                id="appstate" 
                                rows="8" 
                                placeholder='Paste your appstate.json content here...'
                            ></textarea>
                            <small class="hint">Get this from Facebook cookies extension</small>
                        </div>
                        <div id="appstateStatus" class="status-badge">
                            <i class="fas fa-times-circle"></i>
                            <span>No appstate loaded</span>
                        </div>
                    </div>
                </div>

                <!-- Basic Settings -->
                <div class="card settings-card">
                    <div class="card-header">
                        <i class="fas fa-cog"></i>
                        <h2>Basic Settings</h2>
                    </div>
                    <div class="card-body">
                        <div class="form-group">
                            <label for="prefix">
                                <i class="fas fa-terminal"></i>
                                Command Prefix
                            </label>
                            <input 
                                type="text" 
                                id="prefix" 
                                placeholder="/" 
                                maxlength="2"
                                value="/"
                            >
                            <small class="hint">Character before commands (e.g., /, !, .)</small>
                        </div>

                        <div class="form-group">
                            <label for="adminUid">
                                <i class="fas fa-shield-alt"></i>
                                Admin UID(s)
                            </label>
                            <input 
                                type="text" 
                                id="adminUid" 
                                placeholder="100012345678901, 100098765432101"
                            >
                            <small class="hint">Separate multiple UIDs with commas</small>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Panel - Commands -->
            <div class="right-panel">
                <div class="card commands-card">
                    <div class="card-header">
                        <div class="header-left">
                            <i class="fas fa-code-branch"></i>
                            <h2>Active Commands</h2>
                        </div>
                        <div class="header-actions">
                            <button class="btn-select-all" id="selectAllBtn">
                                <i class="fas fa-check-double"></i>
                                Select All
                            </button>
                            <button class="btn-deselect-all" id="deselectAllBtn">
                                <i class="fas fa-times"></i>
                                Deselect All
                            </button>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input 
                                type="text" 
                                id="commandSearch" 
                                placeholder="Search commands..."
                            >
                        </div>
                        
                        <div class="commands-list" id="commandsList">
                            <!-- Commands will be loaded here -->
                            <div class="loading-commands">
                                <i class="fas fa-spinner fa-spin"></i>
                                Loading commands...
                            </div>
                        </div>

                        <div class="selected-count" id="selectedCount">
                            0 commands selected
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-bar">
            <button class="btn-save" id="saveBtn">
                <i class="fas fa-save"></i>
                Save Configuration
            </button>
            <button class="btn-restart" id="restartBtn">
                <i class="fas fa-sync-alt"></i>
                Restart Bot
            </button>
            <button class="btn-refresh" id="refreshBtn">
                <i class="fas fa-redo-alt"></i>
                Refresh Status
            </button>
        </div>

        <!-- Notification Toast -->
        <div id="toast" class="toast">
            <div class="toast-content">
                <i class="fas fa-check-circle"></i>
                <span id="toastMessage"></span>
            </div>
        </div>
    </div>

    <script>
        // API Base URL (relative path - works with same server)
        const API_BASE = '/api';

        // State management
        let allCommands = [];
        let selectedCommands = [];
        let currentSettings = {};

        // DOM Elements
        const appstateTextarea = document.getElementById('appstate');
        const prefixInput = document.getElementById('prefix');
        const adminUidInput = document.getElementById('adminUid');
        const commandsList = document.getElementById('commandsList');
        const selectedCount = document.getElementById('selectedCount');
        const botStatus = document.getElementById('botStatus');
        const selectAllBtn = document.getElementById('selectAllBtn');
        const deselectAllBtn = document.getElementById('deselectAllBtn');
        const saveBtn = document.getElementById('saveBtn');
        const restartBtn = document.getElementById('restartBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const commandSearch = document.getElementById('commandSearch');
        const appstateStatus = document.getElementById('appstateStatus');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadSettings();
            setupEventListeners();
        });

        // Load settings from server
        async function loadSettings() {
            try {
                showToast('Loading settings...', 'info');
                
                const response = await fetch(`${API_BASE}/settings`);
                const data = await response.json();
                
                if (data.error) throw new Error(data.error);
                
                currentSettings = data;
                
                // Update UI
                prefixInput.value = data.prefix || '/';
                adminUidInput.value = Array.isArray(data.admins) ? data.admins.join(', ') : '';
                
                allCommands = data.allCommands || [];
                selectedCommands = data.activeCommands || [];
                
                // Update appstate status
                updateAppstateStatus(data.hasAppstate);
                
                // Update bot status
                updateBotStatus(data.botRunning || false);
                
                // Render commands
                renderCommands(allCommands, selectedCommands);
                
                showToast('Settings loaded successfully!', 'success');
            } catch (error) {
                console.error('Failed to load settings:', error);
                showToast('Failed to load settings', 'error');
                updateBotStatus(false);
            }
        }

        // Render commands list
        function renderCommands(commands, selected) {
            if (!commands.length) {
                commandsList.innerHTML = '<div class="loading-commands">No commands found</div>';
                return;
            }
            
            const searchTerm = commandSearch.value.toLowerCase();
            const filteredCommands = commands.filter(cmd => 
                cmd.toLowerCase().includes(searchTerm)
            );
            
            let html = '';
            filteredCommands.forEach(cmd => {
                const isSelected = selected.includes(cmd);
                html += `
                    <div class="command-item" onclick="toggleCommand('${cmd}')">
                        <input 
                            type="checkbox" 
                            ${isSelected ? 'checked' : ''}
                            onchange="toggleCommand('${cmd}')"
                        >
                        <div class="command-info">
                            <div class="command-name">${cmd}</div>
                            <div class="command-desc">/${cmd} command</div>
                        </div>
                    </div>
                `;
            });
            
            commandsList.innerHTML = html;
            updateSelectedCount();
        }

        // Toggle command selection
        window.toggleCommand = function(command) {
            const index = selectedCommands.indexOf(command);
            if (index === -1) {
                selectedCommands.push(command);
            } else {
                selectedCommands.splice(index, 1);
            }
            renderCommands(allCommands, selectedCommands);
        };

        // Update selected count
        function updateSelectedCount() {
            selectedCount.textContent = `${selectedCommands.length} of ${allCommands.length} commands selected`;
        }

        // Update appstate status
        function updateAppstateStatus(hasAppstate) {
            if (hasAppstate) {
                appstateStatus.innerHTML = `
                    <i class="fas fa-check-circle"></i>
                    <span>Appstate loaded</span>
                `;
                appstateStatus.classList.add('loaded');
            } else {
                appstateStatus.innerHTML = `
                    <i class="fas fa-times-circle"></i>
                    <span>No appstate loaded</span>
                `;
                appstateStatus.classList.remove('loaded');
            }
        }

        // Update bot status
        function updateBotStatus(isOnline) {
            if (isOnline) {
                botStatus.innerHTML = `
                    <i class="fas fa-circle"></i>
                    <span>Bot Online</span>
                `;
                botStatus.classList.add('online');
            } else {
                botStatus.innerHTML = `
                    <i class="fas fa-circle"></i>
                    <span>Bot Offline</span>
                `;
                botStatus.classList.remove('online');
            }
        }

        // Show toast notification
        function showToast(message, type = 'success') {
            toastMessage.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Save configuration
        async function saveConfiguration() {
            try {
                showToast('Saving configuration...', 'info');
                
                // Parse admin UIDs
                const admins = adminUidInput.value
                    .split(',')
                    .map(uid => uid.trim())
                    .filter(uid => uid);
                
                // Parse appstate
                let appstate = null;
                if (appstateTextarea.value.trim()) {
                    try {
                        appstate = JSON.parse(appstateTextarea.value);
                    } catch (e) {
                        showToast('Invalid JSON in appstate', 'error');
                        return;
                    }
                }
                
                const config = {
                    prefix: prefixInput.value || '/',
                    admins: admins,
                    activeCommands: selectedCommands,
                    appstate: appstate
                };
                
                const response = await fetch(`${API_BASE}/save-settings`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(config)
                });
                
                const data = await response.json();
                
                if (data.error) throw new Error(data.error);
                
                showToast('Configuration saved successfully!', 'success');
                
                // Clear appstate textarea after successful save
                appstateTextarea.value = '';
                updateAppstateStatus(true);
                
                // Reload settings to reflect changes
                setTimeout(() => loadSettings(), 1000);
            } catch (error) {
                console.error('Failed to save:', error);
                showToast('Failed to save configuration', 'error');
            }
        }

        // Restart bot
        async function restartBot() {
            try {
                showToast('Restarting bot...', 'info');
                
                const response = await fetch(`${API_BASE}/restart-bot`, {
                    method: 'POST'
                });
                
                const data = await response.json();
                
                if (data.error) throw new Error(data.error);
                
                showToast('Bot restarted successfully!', 'success');
                
                // Update status after restart
                setTimeout(() => loadSettings(), 2000);
            } catch (error) {
                console.error('Failed to restart:', error);
                showToast('Failed to restart bot', 'error');
            }
        }

        // Stop bot
        async function stopBot() {
            try {
                const response = await fetch(`${API_BASE}/stop-bot`, {
                    method: 'POST'
                });
                
                const data = await response.json();
                
                if (data.error) throw new Error(data.error);
                
                showToast('Bot stopped', 'success');
                updateBotStatus(false);
            } catch (error) {
                console.error('Failed to stop:', error);
            }
        }

        // Start bot
        async function startBot() {
            try {
                const response = await fetch(`${API_BASE}/start-bot`, {
                    method: 'POST'
                });
                
                const data = await response.json();
                
                if (data.error) throw new Error(data.error);
                
                showToast('Bot started', 'success');
                updateBotStatus(true);
            } catch (error) {
                console.error('Failed to start:', error);
            }
        }

        // Setup event listeners
        function setupEventListeners() {
            // Select all commands
            selectAllBtn.addEventListener('click', () => {
                selectedCommands = [...allCommands];
                renderCommands(allCommands, selectedCommands);
                showToast('All commands selected', 'success');
            });
            
            // Deselect all commands
            deselectAllBtn.addEventListener('click', () => {
                selectedCommands = [];
                renderCommands(allCommands, selectedCommands);
                showToast('All commands deselected', 'success');
            });
            
            // Search commands
            commandSearch.addEventListener('input', () => {
                renderCommands(allCommands, selectedCommands);
            });
            
            // Save button
            saveBtn.addEventListener('click', saveConfiguration);
            
            // Restart button
            restartBtn.addEventListener('click', restartBot);
            
            // Refresh button
            refreshBtn.addEventListener('click', loadSettings);
            
            // Auto-format appstate JSON
            appstateTextarea.addEventListener('blur', () => {
                try {
                    const value = appstateTextarea.value.trim();
                    if (value) {
                        const parsed = JSON.parse(value);
                        appstateTextarea.value = JSON.stringify(parsed, null, 2);
                    }
                } catch (e) {
                    // Invalid JSON, leave as is
                }
            });
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            // Ctrl+S to save
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                saveConfiguration();
            }
            
            // Ctrl+R to restart
            if (e.ctrlKey && e.key === 'r') {
                e.preventDefault();
                restartBot();
            }
        });
    </script>
</body>
</html>

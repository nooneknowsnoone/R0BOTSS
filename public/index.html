<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Autobot Web Controller</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 20px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo i {
            font-size: 2.5rem;
            color: #667eea;
        }

        .logo h1 {
            font-size: 1.8rem;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: #f8f9fa;
            border-radius: 50px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #6c757d;
            transition: background-color 0.3s ease;
        }

        .status-dot.running {
            background-color: #28a745;
            box-shadow: 0 0 10px #28a745;
        }

        .status-dot.stopped {
            background-color: #dc3545;
        }

        #statusText {
            font-weight: 500;
        }

        /* Main Content */
        .main-content {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 30px;
        }

        /* Cards */
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .card h2 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #495057;
        }

        .card h2 i {
            color: #667eea;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #495057;
        }

        .form-group label small {
            display: block;
            font-weight: normal;
            font-size: 0.85rem;
            color: #6c757d;
            margin-top: 4px;
        }

        .form-group.half {
            width: 48%;
        }

        .form-row {
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }

        textarea, input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: border-color 0.3s ease;
        }

        textarea:focus, input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.9rem;
        }

        /* Command Selector */
        .command-selector {
            border: 2px solid #e9ecef;
            border-radius: 10px;
            overflow: hidden;
        }

        .command-actions {
            padding: 15px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            gap: 10px;
        }

        .btn-small {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            background: white;
            color: #495057;
            font-size: 0.85rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            border: 1px solid #dee2e6;
            transition: all 0.3s ease;
        }

        .btn-small:hover {
            background: #e9ecef;
        }

        .commands-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
        }

        .command-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: #f8f9fa;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .command-item:hover {
            background: #e9ecef;
        }

        .command-item input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .command-item label {
            margin: 0;
            font-size: 0.9rem;
            cursor: pointer;
            flex: 1;
        }

        /* Buttons */
        .form-actions {
            margin-top: 25px;
            text-align: right;
        }

        .btn-primary {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-success, .btn-danger, .btn-secondary {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover:not(:disabled) {
            background: #218838;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover:not(:disabled) {
            background: #c82333;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-success:disabled, .btn-danger:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        /* Bot Info */
        .bot-info {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
        }

        .bot-info h3 {
            font-size: 1rem;
            margin-bottom: 15px;
            color: #495057;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .info-label {
            font-size: 0.85rem;
            color: #6c757d;
        }

        .info-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: #495057;
        }

        /* Logs Panel */
        .logs-panel {
            grid-column: span 2;
        }

        .logs-container {
            background: #1e1e2f;
            border-radius: 10px;
            padding: 15px;
            height: 300px;
            overflow-y: auto;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .log-entry {
            padding: 8px 10px;
            margin-bottom: 5px;
            border-radius: 5px;
            display: flex;
            gap: 15px;
            border-left: 3px solid transparent;
        }

        .log-entry.stdout {
            background: rgba(40, 167, 69, 0.1);
            border-left-color: #28a745;
        }

        .log-entry.stderr {
            background: rgba(220, 53, 69, 0.1);
            border-left-color: #dc3545;
        }

        .log-entry.info {
            background: rgba(0, 123, 255, 0.1);
            border-left-color: #007bff;
        }

        .log-time {
            color: #6c757d;
            font-size: 0.8rem;
            min-width: 80px;
        }

        .log-message {
            color: #f8f9fa;
            word-break: break-word;
        }

        .log-actions {
            display: flex;
            justify-content: flex-end;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 25px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        .toast.show {
            display: flex;
        }

        .toast.success {
            border-left: 4px solid #28a745;
        }

        .toast.error {
            border-left: 4px solid #dc3545;
        }

        .toast i {
            font-size: 1.2rem;
        }

        .toast.success i {
            color: #28a745;
        }

        .toast.error i {
            color: #dc3545;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 30px;
            color: #6c757d;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .logs-panel {
                grid-column: span 1;
            }
            
            .form-row {
                flex-direction: column;
            }
            
            .form-group.half {
                width: 100%;
            }
            
            .header {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <i class="fab fa-facebook-messenger"></i>
                <h1>Facebook Autobot Web</h1>
            </div>
            <div class="status-indicator">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">Loading...</span>
            </div>
        </header>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Configuration Panel -->
            <div class="config-panel card">
                <h2><i class="fas fa-cog"></i> Bot Configuration</h2>
                
                <div class="form-group">
                    <label for="appstate">
                        <i class="fas fa-key"></i> AppState JSON
                        <small>Paste your Facebook cookies JSON here</small>
                    </label>
                    <textarea id="appstate" rows="8" placeholder='[{"key":"c_user","value":"123456789","domain":".facebook.com"}]'></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group half">
                        <label for="prefix">
                            <i class="fas fa-hashtag"></i> Command Prefix
                        </label>
                        <input type="text" id="prefix" placeholder="/" value="/">
                    </div>
                    <div class="form-group half">
                        <label for="adminUid">
                            <i class="fas fa-user-shield"></i> Admin UID
                        </label>
                        <input type="text" id="adminUid" placeholder="Facebook User ID">
                    </div>
                </div>

                <div class="form-group">
                    <label>
                        <i class="fas fa-code-branch"></i> Select Commands
                    </label>
                    <div class="command-selector">
                        <div class="command-actions">
                            <button id="selectAllBtn" class="btn-small"><i class="fas fa-check-double"></i> Select All</button>
                            <button id="deselectAllBtn" class="btn-small"><i class="fas fa-times"></i> Deselect All</button>
                        </div>
                        <div id="commandsList" class="commands-grid">
                            <!-- Commands will be loaded here -->
                            <div class="loading">Loading commands...</div>
                        </div>
                    </div>
                </div>

                <div class="form-actions">
                    <button id="saveConfigBtn" class="btn-primary">
                        <i class="fas fa-save"></i> Save Configuration
                    </button>
                </div>
            </div>

            <!-- Control Panel -->
            <div class="control-panel card">
                <h2><i class="fas fa-play-circle"></i> Bot Controls</h2>
                
                <div class="button-group">
                    <button id="startBotBtn" class="btn-success">
                        <i class="fas fa-play"></i> Start Bot
                    </button>
                    <button id="stopBotBtn" class="btn-danger" disabled>
                        <i class="fas fa-stop"></i> Stop Bot
                    </button>
                    <button id="refreshStatusBtn" class="btn-secondary">
                        <i class="fas fa-sync-alt"></i> Refresh Status
                    </button>
                </div>

                <div class="bot-info">
                    <h3><i class="fas fa-info-circle"></i> Bot Information</h3>
                    <div class="info-grid">
                        <div class="info-item">
                            <span class="info-label">Prefix:</span>
                            <span class="info-value" id="infoPrefix">/</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Admin UID:</span>
                            <span class="info-value" id="infoAdmin">Not set</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Active Commands:</span>
                            <span class="info-value" id="infoCommands">0</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">AppState:</span>
                            <span class="info-value" id="infoAppState">Not configured</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Logs Panel -->
            <div class="logs-panel card">
                <h2><i class="fas fa-terminal"></i> Bot Logs</h2>
                <div class="logs-container" id="logsContainer">
                    <div class="log-entry info">
                        <span class="log-time">System</span>
                        <span class="log-message">Ready to start bot...</span>
                    </div>
                </div>
                <div class="log-actions">
                    <button id="clearLogsBtn" class="btn-small"><i class="fas fa-trash"></i> Clear Logs</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script>
        // API Base URL (empty for same origin)
        const API_BASE = '';

        // State
        let botStatus = 'stopped';
        let commands = [];
        let selectedCommands = new Set();
        let settings = {
            prefix: '/',
            adminUid: ''
        };
        let lastLogCount = 0;

        // DOM Elements
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const appstateTextarea = document.getElementById('appstate');
        const prefixInput = document.getElementById('prefix');
        const adminUidInput = document.getElementById('adminUid');
        const commandsList = document.getElementById('commandsList');
        const startBtn = document.getElementById('startBotBtn');
        const stopBtn = document.getElementById('stopBotBtn');
        const refreshBtn = document.getElementById('refreshStatusBtn');
        const saveBtn = document.getElementById('saveConfigBtn');
        const selectAllBtn = document.getElementById('selectAllBtn');
        const deselectAllBtn = document.getElementById('deselectAllBtn');
        const clearLogsBtn = document.getElementById('clearLogsBtn');
        const logsContainer = document.getElementById('logsContainer');
        const toast = document.getElementById('toast');

        // Info display elements
        const infoPrefix = document.getElementById('infoPrefix');
        const infoAdmin = document.getElementById('infoAdmin');
        const infoCommands = document.getElementById('infoCommands');
        const infoAppState = document.getElementById('infoAppState');

        // Initialize
        async function init() {
            await loadCommands();
            await loadSettings();
            await updateBotStatus();
            setupEventListeners();
            startLogPolling();
        }

        // Load commands from server
        async function loadCommands() {
            try {
                const response = await fetch(`${API_BASE}/api/commands`);
                const data = await response.json();
                
                if (data.success) {
                    commands = data.commands;
                    renderCommands();
                    
                    // Update selected commands set
                    selectedCommands.clear();
                    commands.forEach(cmd => {
                        if (cmd.selected) {
                            selectedCommands.add(cmd.filename);
                        }
                    });
                }
            } catch (error) {
                showToast('Failed to load commands', 'error');
                // Demo mode - load sample commands
                loadSampleCommands();
            }
        }

        // Load sample commands for demo
        function loadSampleCommands() {
            commands = [
                { name: 'ping', filename: 'ping.js', selected: true },
                { name: 'echo', filename: 'echo.js', selected: true },
                { name: 'help', filename: 'help.js', selected: true },
                { name: 'info', filename: 'info.js', selected: true },
                { name: 'tiktok', filename: 'tiktok.js', selected: false },
                { name: 'weather', filename: 'weather.js', selected: false },
                { name: 'youtube', filename: 'youtube.js', selected: false },
                { name: 'translate', filename: 'translate.js', selected: false }
            ];
            renderCommands();
            
            // Update selected commands set
            selectedCommands.clear();
            commands.forEach(cmd => {
                if (cmd.selected) {
                    selectedCommands.add(cmd.filename);
                }
            });
            updateCommandsCount();
        }

        // Load settings from server
        async function loadSettings() {
            try {
                const response = await fetch(`${API_BASE}/api/settings`);
                const data = await response.json();
                
                if (data.success) {
                    settings = data.settings;
                    prefixInput.value = settings.prefix || '/';
                    adminUidInput.value = settings.adminUid || '';
                    
                    // Update info display
                    infoPrefix.textContent = settings.prefix || '/';
                    infoAdmin.textContent = settings.adminUid || 'Not set';
                    infoAppState.textContent = data.hasAppState ? '✅ Configured' : '❌ Not configured';
                }
            } catch (error) {
                showToast('Failed to load settings', 'error');
                // Demo mode - set sample values
                prefixInput.value = '/';
                adminUidInput.value = '1000123456789';
                infoPrefix.textContent = '/';
                infoAdmin.textContent = '1000123456789';
                infoAppState.textContent = '✅ Configured';
            }
        }

        // Render commands in grid
        function renderCommands() {
            if (commands.length === 0) {
                commandsList.innerHTML = '<div class="loading">No commands available</div>';
                return;
            }
            
            let html = '';
            commands.forEach(cmd => {
                html += `
                    <div class="command-item">
                        <input type="checkbox" id="cmd_${cmd.filename}" 
                               value="${cmd.filename}" ${cmd.selected ? 'checked' : ''}>
                        <label for="cmd_${cmd.filename}">${cmd.name}</label>
                    </div>
                `;
            });
            
            commandsList.innerHTML = html;
            
            // Add event listeners to checkboxes
            document.querySelectorAll('.command-item input[type="checkbox"]').forEach(checkbox => {
                checkbox.addEventListener('change', function() {
                    if (this.checked) {
                        selectedCommands.add(this.value);
                    } else {
                        selectedCommands.delete(this.value);
                    }
                    updateCommandsCount();
                });
            });
            
            updateCommandsCount();
        }

        // Update commands count in info panel
        function updateCommandsCount() {
            infoCommands.textContent = selectedCommands.size;
        }

        // Update bot status
        async function updateBotStatus() {
            try {
                const response = await fetch(`${API_BASE}/api/status`);
                const data = await response.json();
                
                if (data.success) {
                    botStatus = data.status;
                    updateStatusUI();
                }
            } catch (error) {
                // Demo mode - simulate status
                botStatus = Math.random() > 0.5 ? 'running' : 'stopped';
                updateStatusUI();
            }
        }

        function updateStatusUI() {
            if (botStatus === 'running') {
                statusDot.className = 'status-dot running';
                statusText.textContent = 'Running';
                startBtn.disabled = true;
                stopBtn.disabled = false;
                
                // Add sample log for running state
                addLog('info', 'Bot is running and connected to Facebook');
            } else {
                statusDot.className = 'status-dot stopped';
                statusText.textContent = 'Stopped';
                startBtn.disabled = false;
                stopBtn.disabled = true;
            }
        }

        // Start bot
        async function startBot() {
            try {
                const response = await fetch(`${API_BASE}/api/start`, {
                    method: 'POST'
                });
                const data = await response.json();
                
                if (data.success) {
                    showToast('Bot started successfully', 'success');
                    await updateBotStatus();
                    addLog('info', 'Bot started successfully');
                    addLog('stdout', 'Connecting to Facebook...');
                    setTimeout(() => {
                        addLog('stdout', '✓ Logged in as "Facebook Bot"');
                        addLog('stdout', '📝 Listening for messages...');
                    }, 1000);
                } else {
                    showToast(data.error || 'Failed to start bot', 'error');
                }
            } catch (error) {
                // Demo mode - simulate start
                showToast('Bot started successfully (DEMO MODE)', 'success');
                botStatus = 'running';
                updateStatusUI();
                addLog('info', 'Bot started successfully (DEMO)');
                addLog('stdout', 'Connecting to Facebook...');
                setTimeout(() => {
                    addLog('stdout', '✓ Logged in as "Demo Bot"');
                    addLog('stdout', '📝 Listening for messages...');
                    setTimeout(() => {
                        addLog('stdout', '💬 User 123456789: /ping');
                        addLog('stdout', '🤖 Bot: 🏓 Pong! (87ms)');
                    }, 2000);
                }, 1000);
            }
        }

        // Stop bot
        async function stopBot() {
            try {
                const response = await fetch(`${API_BASE}/api/stop`, {
                    method: 'POST'
                });
                const data = await response.json();
                
                if (data.success) {
                    showToast('Bot stopped successfully', 'success');
                    await updateBotStatus();
                    addLog('info', 'Bot stopped by user');
                } else {
                    showToast(data.error || 'Failed to stop bot', 'error');
                }
            } catch (error) {
                // Demo mode - simulate stop
                showToast('Bot stopped successfully (DEMO MODE)', 'success');
                botStatus = 'stopped';
                updateStatusUI();
                addLog('info', 'Bot stopped by user (DEMO)');
            }
        }

        // Save configuration
        async function saveConfiguration() {
            // Validate appstate
            const appstate = appstateTextarea.value.trim();
            if (!appstate) {
                showToast('Please paste your AppState JSON', 'error');
                return;
            }
            
            // Validate JSON
            try {
                JSON.parse(appstate);
            } catch (e) {
                showToast('Invalid JSON format in AppState', 'error');
                return;
            }
            
            const config = {
                appstate: appstate,
                selectedCommands: Array.from(selectedCommands),
                prefix: prefixInput.value.trim() || '/',
                adminUid: adminUidInput.value.trim()
            };
            
            try {
                const response = await fetch(`${API_BASE}/api/configure`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(config)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showToast('Configuration saved successfully', 'success');
                    await loadSettings();
                    addLog('info', `Configuration saved with prefix "${config.prefix}" and ${config.selectedCommands.length} commands`);
                } else {
                    showToast(data.error || 'Failed to save configuration', 'error');
                }
            } catch (error) {
                // Demo mode - simulate save
                showToast('Configuration saved successfully (DEMO MODE)', 'success');
                infoPrefix.textContent = config.prefix;
                infoAdmin.textContent = config.adminUid || 'Not set';
                infoAppState.textContent = '✅ Configured';
                infoCommands.textContent = config.selectedCommands.length;
                addLog('info', `✅ Configuration saved: ${config.selectedCommands.length} commands enabled`);
            }
        }

        // Poll logs
        async function pollLogs() {
            try {
                const response = await fetch(`${API_BASE}/api/logs`);
                const data = await response.json();
                
                if (data.success && data.logs.length > lastLogCount) {
                    // New logs available
                    renderLogs(data.logs);
                    lastLogCount = data.logs.length;
                }
            } catch (error) {
                // Silent fail in demo mode
            }
        }

        // Render logs
        function renderLogs(logs) {
            if (logs.length === 0) {
                logsContainer.innerHTML = '<div class="log-entry info"><span class="log-time">System</span><span class="log-message">No logs available</span></div>';
                return;
            }
            
            let html = '';
            logs.forEach(log => {
                const time = new Date(log.timestamp).toLocaleTimeString();
                html += `
                    <div class="log-entry ${log.type}">
                        <span class="log-time">${time}</span>
                        <span class="log-message">${escapeHtml(log.message)}</span>
                    </div>
                `;
            });
            
            logsContainer.innerHTML = html;
            logsContainer.scrollTop = logsContainer.scrollHeight;
        }

        // Add a log entry (for demo mode)
        function addLog(type, message) {
            const time = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.className = `log-entry ${type}`;
            logEntry.innerHTML = `<span class="log-time">${time}</span><span class="log-message">${escapeHtml(message)}</span>`;
            logsContainer.appendChild(logEntry);
            logsContainer.scrollTop = logsContainer.scrollHeight;
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Clear logs
        function clearLogs() {
            logsContainer.innerHTML = '<div class="log-entry info"><span class="log-time">System</span><span class="log-message">Logs cleared</span></div>';
            lastLogCount = 0;
            showToast('Logs cleared', 'success');
        }

        // Show toast notification
        function showToast(message, type = 'success') {
            toast.className = `toast show ${type}`;
            toast.innerHTML = `
                <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i>
                <span>${message}</span>
            `;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Select all commands
        function selectAllCommands() {
            document.querySelectorAll('.command-item input[type="checkbox"]').forEach(checkbox => {
                checkbox.checked = true;
                selectedCommands.add(checkbox.value);
            });
            updateCommandsCount();
        }

        // Deselect all commands
        function deselectAllCommands() {
            document.querySelectorAll('.command-item input[type="checkbox"]').forEach(checkbox => {
                checkbox.checked = false;
                selectedCommands.delete(checkbox.value);
            });
            updateCommandsCount();
        }

        // Setup event listeners
        function setupEventListeners() {
            startBtn.addEventListener('click', startBot);
            stopBtn.addEventListener('click', stopBot);
            refreshBtn.addEventListener('click', updateBotStatus);
            saveBtn.addEventListener('click', saveConfiguration);
            selectAllBtn.addEventListener('click', selectAllCommands);
            deselectAllBtn.addEventListener('click', deselectAllCommands);
            clearLogsBtn.addEventListener('click', clearLogs);
            
            // Auto-refresh status every 10 seconds
            setInterval(updateBotStatus, 10000);
        }

        // Start log polling
        function startLogPolling() {
            if (!API_BASE) {
                // Demo mode - add sample logs periodically
                setInterval(() => {
                    if (botStatus === 'running') {
                        const logs = [
                            '💬 User 123456: /ping',
                            '🤖 Bot: 🏓 Pong!',
                            '💬 User 789012: /help',
                            '🤖 Bot: 📚 Available commands...',
                            '💬 User 123456: /echo Hello',
                            '🤖 Bot: 🔄 Echo: "Hello"'
                        ];
                        const randomLog = logs[Math.floor(Math.random() * logs.length)];
                        addLog('stdout', randomLog);
                    }
                }, 5000);
            } else {
                pollLogs();
                setInterval(pollLogs, 3000);
            }
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
